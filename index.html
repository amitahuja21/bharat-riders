let lang = "en";
let screen = "welcome"; // welcome | register | vehicle | fuel | evq | general | done
let speaking = false;
let copied = false;
let submitting = false;
let errMsg = "";
const refCode = "RW" + Math.random().toString(36).substr(2,8).toUpperCase();

  name:"",phone:"",state:"",city:"",cityOther:"",platforms:[],platformOther:"",
  vehicleType:"",fuelType:"",evSpeed:"",charging:"",chargeTime:"",vehicleCost:"",
  ownership:"",rental:"",expenses:"",
  hasInsurance:"",insuranceType:"",insurancePremium:"",servicingCost:"",personalAccident:"",

};

function getRefLink(){
  // Use actual deployed URL — falls back to window.location if on the real domain
  const deployedURL = "https://amitahuja21.github.io/bharat-riders/";
  const base = (window.location.protocol==="about:"||window.location.host==="")
    ? deployedURL
    : window.location.protocol+"//"+window.location.host+window.location.pathname;
  return base+"?ref="+refCode;
}

function t(){ return T[lang]; }

// ─── RENDER ENGINE ────────────────────────────────────────────────────────────
function render(scrollTop){
  const pct = {welcome:0,register:15,vehicle:30,fuel:45,evq:60,general:78,done:100}[screen]||0;
  document.getElementById("progress-fill").style.width = pct+"%";
  const app = document.getElementById("screen-content");
  // Save scroll BEFORE touching DOM
  const savedScroll = window.pageYOffset || document.documentElement.scrollTop;
  app.innerHTML = screens[screen]();
  attachEvents();
  if(scrollTop){
    // Screen change — go to top
    document.documentElement.scrollTop = 0;
    document.body.scrollTop = 0;
  } else {
    // Option/chip click — restore position using rAF so DOM has settled
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        document.documentElement.scrollTop = savedScroll;
        document.body.scrollTop = savedScroll;
      });
    });
  }
}

// ─── SPEECH ───────────────────────────────────────────────────────────────────
function speak(text){
  if(!("speechSynthesis" in window)) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = LANG_META[lang].code;
  u.rate = 0.82; u.pitch = 1.05;
  speaking = true; render();
  u.onend = ()=>{ speaking=false; render(); };
  u.onerror = ()=>{ speaking=false; render(); };
  window.speechSynthesis.speak(u);
}
function stopSpeak(){ window.speechSynthesis.cancel(); speaking=false; render(); }

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function el(tag,cls,inner,attrs=""){
  return `<${tag} class="${cls}" ${attrs}>${inner}</${tag}>`;
}
function chip(label,active,onclick){
  return `<button class="chip${active?" active":""}" onclick="${onclick}">${label}</button>`;
}
function optBtn(label,active,onclick){
  return `<button class="opt-btn${active?" active":""}" onclick="${onclick}">${label}</button>`;
}
function audioBar(text){
  const escaped = text.replace(/'/g,"\\'").replace(/"/g,"&quot;");
  return `<div class="audio-row">
    <button class="audio-btn${speaking?" speaking":""}" onclick="speak('${escaped}')">${t().listen}</button>
    ${speaking?`<button class="audio-btn speaking" onclick="stopSpeak()">${t().stop}</button>`:""}
  </div>`;
}
function stateOptions(){
  return Object.keys(STATE_CITIES).sort().map(s=>
    `<option value="${s}"${fd.state===s?" selected":""}>${s}</option>`
  ).join("");
}
function cityOptions(){
  if(!fd.state) return "";
  const cities = (STATE_CITIES[fd.state]||[]).map(c=>
    `<option value="${c}"${fd.city===c?" selected":""}>${c}</option>`
  ).join("");
  return cities + `<option value="Other"${fd.city==="Other"?" selected":""}>📝 Other (Type below)</option>`;
}
function rentalOpts(){
  return fd.vehicleType==="4W"?t().rentals4W:fd.vehicleType==="3W"?t().rentals3W:t().rentals2W;
}

// ─── TOGGLE ARRAY ────────────────────────────────────────────────────────────
function toggleArr(field,val){
  const i = fd[field].indexOf(val);
  if(i>-1) fd[field].splice(i,1); else fd[field].push(val);
  render();
}

  register(){
    return `<div class="card">
      <p class="step-title">📋 ${t().stepRegister}</p>
      ${audioBar(t().nameLabel+". "+t().phoneLabel+". "+t().stateLabel+". "+t().platformsQ)}
      <label class="field-label">${t().nameLabel} *</label>
      <input type="text" placeholder="${t().namePH}" value="${fd.name}" oninput="fd.name=this.value"/>
      <label class="field-label">${t().phoneLabel} *</label>
      <input type="tel" placeholder="${t().phonePH}" value="${fd.phone}" maxlength="10" oninput="fd.phone=this.value.replace(/\\D/g,'')"/>
      <label class="field-label">${t().stateLabel} *</label>
      <select onchange="fd.state=this.value;fd.city='';render()">
        <option value="">-- ${t().stateLabel} --</option>
        ${stateOptions()}
      </select>
      <label class="field-label">${t().cityLabel} *</label>
      <select ${!fd.state?"disabled":""} onchange="fd.city=this.value;render()">
        <option value="">-- ${t().cityLabel} --</option>
        ${cityOptions()}
      </select>
      ${fd.city==="Other"?`
      <label class="field-label" style="color:#0a5c28;font-weight:700">📝 Please type your city name *</label>
      <input type="text" placeholder="Enter your city name" value="${fd.cityOther}"
        style="border-color:#16a34a;background:#edfaf2"
        oninput="fd.cityOther=this.value"/>
      `:""}
      <p class="section-q">${t().platformsQ} *</p>
      <div class="chip-grid">
        ${t().platforms.map(p=>chip(p,fd.platforms.includes(p),`toggleArr('platforms','${p.replace(/'/g,"\\'")}')` )).join("")}
      </div>
      ${(fd.platforms.includes('Other')||fd.platforms.includes('अन्य')||fd.platforms.includes('અन્ય')||fd.platforms.includes('इतर')||fd.platforms.includes('மற்றவை')||fd.platforms.includes('ఇతరాలు')||fd.platforms.includes('ಇತರ')||fd.platforms.includes('অন্য'))?`
        <label class="field-label" style="color:#0a5c28;font-weight:700;margin-top:2px">📝 Please specify your platform *</label>
        <input type="text" placeholder="e.g. Shadowfax, WeFast, Borzo..." value="${fd.platformOther}" style="border:1.5px solid #16a34a;background:#edfaf2;width:100%;border-radius:10px;padding:12px 14px;font-size:15px;outline:none;margin-bottom:10px;font-family:'Noto Sans',sans-serif;box-sizing:border-box" oninput="fd.platformOther=this.value"/>
      `:""}
            ${errMsg?`<p class="err-msg">${errMsg}</p>`:""}
      <button class="next-btn" onclick="submitRegister()">${t().next}</button>
    </div>`;
  },
  vehicle(){
    return `<div class="card">
      <p class="step-title">🚗 ${t().vehicleQ}</p>
      ${audioBar(t().vehicleQ+" "+t().tw+". "+t().thw+". "+t().fw+".")}
      <div class="vehicle-row">
        ${[["2W","🏍️",t().tw,t().twSub],["3W","🛺",t().thw,t().thwSub],["4W","🚗",t().fw,t().fwSub]].map(([v,icon,lbl,sub])=>
          `<div class="vehicle-card${fd.vehicleType===v?" active":""}" onclick="fd.vehicleType='${v}';render()">
            <div class="icon">${icon}</div>
            <div class="vlabel">${lbl}</div>
            <div class="vsub">${sub}</div>
          </div>`
        ).join("")}
      </div>
      ${fd.vehicleType?`
        <div class="divider"></div>
        <p class="section-q">${t().ownershipQ}</p>
        <div class="two-col">
          <div class="vehicle-card${fd.ownership==="own"?" active":""}" onclick="fd.ownership='own';render()">
            <div style="font-size:28px">🏠</div>
            <div style="margin-top:6px;font-size:13px;font-weight:700">${t().own}</div>
          </div>
          <div class="vehicle-card${fd.ownership==="rent"?" active":""}" onclick="fd.ownership='rent';render()">
            <div style="font-size:28px">📋</div>
            <div style="margin-top:6px;font-size:13px;font-weight:700">${t().rent}</div>
          </div>
        </div>
        ${fd.ownership==="rent"?`
          <p class="section-q">${t().rentalQ}</p>
          <div class="chip-grid">
            ${rentalOpts().map(r=>chip(r,fd.rental===r,`fd.rental='${r.replace(/'/g,"\\'")}';render()`)).join("")}
          </div>
        `:""}
      `:""}
      ${errMsg?`<p class="err-msg">${errMsg}</p>`:""}
      <button class="next-btn" onclick="submitVehicle()">${t().next}</button>
    </div>`;
  },
  fuel(){
    return `<div class="card">
      <p class="step-title">⛽ ${t().fuelQ}</p>
      ${audioBar(t().fuelQ+" "+t().ev+". "+t().petrol+". "+t().diesel+".")}
      <div class="vehicle-row">
        ${[["EV","⚡",t().ev],["Petrol","⛽",t().petrol],["Diesel","🛢️",t().diesel]].map(([v,icon,lbl])=>
          `<div class="vehicle-card${fd.fuelType===v?" active":""}" onclick="fd.fuelType='${v}';render()" style="font-size:13px;font-weight:700;color:${fd.fuelType===v?"#0a5c28":"#7a9e8a"}">
            <div style="font-size:36px">${icon}</div>
            <div style="margin-top:6px">${lbl}</div>
          </div>`
        ).join("")}
      </div>
      ${errMsg?`<p class="err-msg">${errMsg}</p>`:""}
      <button class="next-btn" onclick="submitFuel()">${t().next}</button>
    </div>`;
  },
  evq(){
    function sq(s){ return "'" + s.replace(/'/g,"\\'") + "'"; }
    return `<div class="card">
      <p class="step-title">⚡ EV Details</p>
      ${audioBar(t().evSpeedQ+" "+t().chargingQ)}

      <p class="section-q">${t().evSpeedQ}</p>
      <div class="opt-row">
        ${[[t().slow,"slow"],[t().fast,"fast"]].map(([lbl,v])=>
          optBtn(lbl,fd.evSpeed===v,`fd.evSpeed='${v}';render()`)
        ).join("")}
      </div>

      <p class="section-q">${t().chargingQ}</p>
      <div class="opt-row">
        ${[[t().homeCharge,"home"],[t().swapCharge,"swap"]].map(([lbl,v])=>
          optBtn(lbl,fd.charging===v,`fd.charging='${v}';render()`)
        ).join("")}
      </div>

      ${fd.charging==="home"?`
        <p class="section-q" style="color:#16a34a">🏠 ${t().chargeTimeQ}</p>
        <div class="chip-grid">
          ${t().chargeTimes.map(c=>chip(c,fd.chargeTime===c,"fd.chargeTime="+sq(c)+";render()")).join("")}
        </div>
        <p class="section-q" style="color:#16a34a">💰 ${t().homeCostQ}</p>
        <div class="chip-grid">
          ${t().homeCosts.map(c=>chip(c,fd.vehicleCost===c,"fd.vehicleCost="+sq(c)+";render()")).join("")}
        </div>
      `:""}

      ${fd.charging==="swap"?`
        <p class="section-q" style="color:#0ea5e9">🔄 ${t().swapWaitQ}</p>
        <div class="chip-grid">
          ${t().swapWaits.map(c=>chip(c,fd.chargeTime===c,"fd.chargeTime="+sq(c)+";render()")).join("")}
        </div>
        <p class="section-q" style="color:#0ea5e9">💰 ${t().swapCostQ}</p>
        <div class="chip-grid">
          ${t().swapCosts.map(c=>chip(c,fd.vehicleCost===c,"fd.vehicleCost="+sq(c)+";render()")).join("")}
        </div>
      `:""}

      <button class="next-btn" onclick="goScreen('general')">${t().next}</button>
    </div>`;
  },
    general(){
    const ins = fd.hasInsurance==="yes";
    function sq(s){ return "'" + s.replace(/'/g,"\\'") + "'"; }
    return `<div class="card">
      <p class="step-title">📋 General Info</p>
      ${audioBar(t().insuranceQ+" "+t().challengesQ)}
      <div class="divider"></div>

      <p class="section-q" style="color:#0a7c3e">🛡️ ${t().insuranceQ}</p>
      <div style="display:flex;gap:10px;margin-bottom:12px">
        ${[[t().yes,"yes"],[t().no,"no"]].map(([lbl,v])=>
          `<button class="opt-btn${fd.hasInsurance===v?" active":""}" style="flex:1" onclick="fd.hasInsurance='${v}';render()">${lbl}</button>`
        ).join("")}
      </div>

      ${ins?`
        <p class="section-q">${t().insuranceTypeQ}</p>
        <div class="chip-grid">
          ${t().insuranceTypes.map(i=>chip(i,fd.insuranceType===i,"fd.insuranceType="+sq(i)+";render()")).join("")}
        </div>
      `:""}

      <p class="section-q" style="color:#0a7c3e">🩺 ${t().personalAccidentQ}</p>
      <div style="display:flex;gap:10px;margin-bottom:16px">
        ${[[t().yes,"yes"],[t().no,"no"]].map(([lbl,v])=>
          `<button class="opt-btn${fd.personalAccident===v?" active":""}" style="flex:1" onclick="fd.personalAccident='${v}';render()">${lbl}</button>`
        ).join("")}
      </div>

      <div class="divider"></div>
      <p class="section-q" style="color:#e91e63">⚠️ ${t().challengesQ}</p>
      <div class="chip-grid">
        ${t().challenges.map(c=>chip(c,fd.challenges.includes(c),"toggleArr('challenges',"+sq(c)+")")).join("")}
      </div>

      <div class="divider"></div>
      <p class="section-q" style="color:#0284c7">🚦 ${t().otherChallengesQ}</p>
      <div class="chip-grid">
        ${t().otherChallenges.map(c=>chip(c,fd.otherChallenges.includes(c),"toggleArr('otherChallenges',"+sq(c)+")")).join("")}
      </div>

      <button class="next-btn" ${submitting?'disabled':''} onclick="submitForm()">${submitting?t().submitting:t().submit}</button>
    </div>`;
  },
  done(){
    const link = getRefLink();
    const waMsg = encodeURIComponent("\u26a1 I joined the *Road Warrior EV Challenge!*\n\uD83C\uDFC6 Answer questions & WIN a brand new EV!\n\n\uD83C\uDF81 Use my referral link:\n"+link+"\n\n\uD83D\uDCF8 Follow: @RoadWarriorIndia");
    return `<div class="card">
      <div class="done-wrap">

function setLang(code){ lang=code; render(); }
function goScreen(s){ errMsg=""; screen=s; render(true); }

function submitRegister(){
  if(!fd.name.trim()||fd.phone.length<10||!fd.state||!fd.city||fd.platforms.length===0){
    errMsg=t().required; render(); return;
  }
  if(fd.city==="Other"&&!fd.cityOther.trim()){
    errMsg="Please type your city name"; render(); return;
  }
  const otherPlatformLabel = t().platforms[t().platforms.length-1];
  if(fd.platforms.includes(otherPlatformLabel)&&!fd.platformOther.trim()){
    errMsg="Please specify your platform name"; render(); return;
  }
  goScreen("vehicle");
}
function submitVehicle(){
  if(!fd.vehicleType){ errMsg=t().required; render(); return; }
  if(!fd.ownership){ errMsg=t().required; render(); return; }
  if(fd.ownership==="rent"&&!fd.rental){ errMsg=t().required; render(); return; }
  goScreen("fuel");
}
function submitFuel(){
  if(!fd.fuelType){ errMsg=t().required; render(); return; }
  goScreen(fd.fuelType==="EV"?"evq":"general");
}

async function submitForm(){
  submitting=true; errMsg=""; render(false);

  // ── Build params matching Apps Script doGet expected fields ───────────────
  const params = new URLSearchParams({
    action          : "submit",
    timestamp       : new Date().toLocaleString("en-IN"),
    refCode         : refCode,
    referredBy      : (new URLSearchParams(window.location.search).get("ref") || ""),
    language        : lang,
    name            : fd.name,
    phone           : fd.phone,
    state           : fd.state,
    city            : fd.city==="Other" ? fd.cityOther : fd.city,
    platforms       : fd.platforms.map(p=>p===t().platforms[t().platforms.length-1]?fd.platformOther||p:p).join(", "),
    vehicleType     : fd.vehicleType,
    currentVehicle  : fd.vehicleType,
    fuelType        : fd.fuelType,
    evSpeed         : fd.evSpeed,
    chargingMethod  : fd.charging,
    chargeTime      : fd.chargeTime,
    ownership       : fd.ownership,
    emiRent         : fd.rental,
    monthlyExpenses : fd.vehicleCost,
    hasInsurance    : fd.hasInsurance,
    insuranceType   : fd.insuranceType,
    challenges      : fd.challenges.join(", "),
    rtoTraining     : fd.otherChallenges.join(", "),
    customerTraining: fd.personalAccident,
    appChallenges   : "",
  });

  // ── Send as GET request — Apps Script handles this natively ───────────────
  try{
    const res  = await fetch(SHEET_URL + "?" + params.toString());
    const json = await res.json();

    if(json.duplicate){
      submitting=false;
      errMsg="⚠️ This mobile number is already registered. Each number can only be submitted once.";
      render(false); return;
    }
    if(!json.success){
      console.warn("Sheet error:", json.message);
    } else {
      console.log("✅ Saved to sheet!");
    }
  }catch(e){
    console.error("Submit error:", e);
    // Still proceed to done screen even if sheet fails
  }

  submitting=false;
  goScreen("done");
}

function copyLink(){
  navigator.clipboard.writeText(getRefLink()).then(()=>{
    copied=true; render();
    setTimeout(()=>{ copied=false; render(); },2000);
  });
}

function attachEvents(){ /* handled inline */ }

  <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
  <div id="screen-content"></div>
`;
render();
</script>
