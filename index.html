<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Road Warrior EV Challenge</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans', sans-serif;
    min-height: 100vh;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    color: #e2e8f0;
  }

  .card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.12);
    padding: 32px 28px;
    width: 100%;
    max-width: 520px;
  }

  .title {
    font-size: 22px;
    font-weight: 800;
    color: #60a5fa;
    margin-bottom: 4px;
    letter-spacing: -0.5px;
  }

  .subtitle {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 24px;
  }

  .progress-bar {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
  }

  .progress-dot {
    flex: 1;
    height: 4px;
    border-radius: 4px;
    background: rgba(255,255,255,0.1);
    transition: background 0.3s;
  }
  .progress-dot.active { background: #60a5fa; }
  .progress-dot.done   { background: #3b82f6; }

  .group { margin-bottom: 20px; }

  label {
    font-size: 13px;
    color: #93c5fd;
    font-weight: 600;
    margin-bottom: 6px;
    display: block;
  }

  input[type="text"], input[type="tel"], select {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 10px;
    padding: 11px 14px;
    color: #e2e8f0;
    font-size: 14px;
    outline: none;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  input[type="text"]:focus, input[type="tel"]:focus, select:focus {
    border-color: #3b82f6;
  }
  input.error, select.error { border-color: #f87171 !important; }

  select { background: #1e293b; cursor: pointer; }
  select option { background: #1e293b; }

  .row { display: flex; gap: 12px; }
  .row > div { flex: 1; }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }

  .chip {
    display: inline-block;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    color: #cbd5e1;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
    user-select: none;
    font-family: inherit;
    background-color: transparent;
  }
  .chip:hover { border-color: rgba(255,255,255,0.3); }
  .chip.active {
    background: rgba(59,130,246,0.25);
    border-color: #3b82f6;
    color: #93c5fd;
  }

  .listen-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: rgba(16,185,129,0.15);
    border: 1px solid rgba(16,185,129,0.3);
    color: #34d399;
    border-radius: 8px;
    padding: 6px 13px;
    font-size: 12px;
    cursor: pointer;
    margin-bottom: 8px;
    font-family: inherit;
    transition: opacity 0.2s;
  }
  .listen-btn:disabled { opacity: 0.5; cursor: default; }

  .btn {
    background: linear-gradient(135deg, #3b82f6, #1d4ed8);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 13px 28px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    width: 100%;
    font-family: inherit;
    transition: opacity 0.2s;
  }
  .btn:disabled { opacity: 0.6; cursor: default; }

  .btn-ghost {
    background: rgba(255,255,255,0.06);
    color: #94a3b8;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 13px 28px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    font-family: inherit;
  }

  .btn-green {
    background: linear-gradient(135deg, #16a34a, #15803d);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 13px 28px;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
    width: 100%;
    font-family: inherit;
    text-align: center;
    text-decoration: none;
    display: block;
    margin-bottom: 12px;
  }

  .nav-row { display: flex; gap: 10px; margin-top: 8px; }
  .nav-row .btn { flex: 2; }
  .nav-row .btn-ghost { flex: 1; }

  .err {
    color: #f87171;
    font-size: 12px;
    margin-top: 5px;
  }
  .err::before { content: "⚠ "; }

  .lang-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 24px;
  }

  .lang-chip {
    display: block;
    width: 100%;
    text-align: center;
    font-size: 15px;
    padding: 12px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 8px;
    cursor: pointer;
    color: #cbd5e1;
    font-family: inherit;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .lang-chip.active {
    background: rgba(59,130,246,0.25);
    border-color: #3b82f6;
    color: #93c5fd;
  }

  .ref-box {
    background: rgba(59,130,246,0.1);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 20px;
    font-size: 13px;
    color: #93c5fd;
    text-align: center;
  }
  .ref-code {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: 3px;
    display: block;
    margin-top: 6px;
  }

  .done-emoji { font-size: 60px; text-align: center; margin-bottom: 16px; }
  .done-title { font-size: 26px; font-weight: 800; color: #60a5fa; text-align: center; margin-bottom: 8px; }
  .done-body  { font-size: 14px; color: #94a3b8; text-align: center; margin-bottom: 24px; }

  .hidden { display: none !important; }

  input[type="text"].other-input { margin-top: 8px; }
</style>
</head>
<body>
<div class="card" id="app"></div>

// ─── SPEECH ───────────────────────────────────────────────────────────────────
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const langCode = LANGUAGES[state.lang].code;
  function doSpeak() {
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.85;
    const voices = window.speechSynthesis.getVoices();
    const prefix = langCode.split("-")[0].toLowerCase();
    const match = voices.find(v => v.lang.toLowerCase() === langCode.toLowerCase())
                || voices.find(v => v.lang.toLowerCase().startsWith(prefix));
    if (match) { u.voice = match; u.lang = match.lang; } else { u.lang = langCode; }
    window.speechSynthesis.speak(u);
  }
  if (window.speechSynthesis.getVoices().length > 0) { doSpeak(); }
  else {
    window.speechSynthesis.onvoiceschanged = () => { window.speechSynthesis.onvoiceschanged = null; doSpeak(); };
    setTimeout(() => { if (window.speechSynthesis.getVoices().length > 0) doSpeak(); }, 300);
  }
}

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function el(tag, attrs={}, ...children) {
  const e = document.createElement(tag);
  for (const [k,v] of Object.entries(attrs)) {
    if (k === 'class') e.className = v;
    else if (k === 'for') e.htmlFor = v;
    else if (k.startsWith('on')) e[k] = v;
    else e.setAttribute(k, v);
  }
  for (const c of children) {
    if (c == null) continue;
    e.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
  }
  return e;
}

function listenBtn(text) {
  const btn = el('button', {class:'listen-btn'}, tr('listen'));
  btn.onclick = () => {
    btn.disabled = true;
    btn.textContent = '🔊 Speaking…';
    speak(text);
    setTimeout(() => { btn.disabled = false; btn.textContent = tr('listen'); }, Math.max(1500, text.length * 80));
  };
  return btn;
}

function chips(options, fieldKey, multi=false) {
  const wrap = el('div', {class:'chips'});
  options.forEach(opt => {
    const chip = el('button', {class:'chip'}, opt);
    const val = state.form[fieldKey];
    if (multi ? val.includes(opt) : val === opt) chip.classList.add('active');
    chip.onclick = () => {
      if (multi) {
        const arr = state.form[fieldKey];
        state.form[fieldKey] = arr.includes(opt) ? arr.filter(x=>x!==opt) : [...arr, opt];
      } else {
        state.form[fieldKey] = opt;
      }
      delete state.errors[fieldKey];
      render();
    };
    wrap.appendChild(chip);
  });
  return wrap;
}

function errMsg(field) {
  if (!state.errors[field]) return null;
  return el('div', {class:'err'}, state.errors[field]);
}

function progress(current) {
  const bar = el('div', {class:'progress-bar'});
  for (let i=1; i<=4; i++) {
    const dot = el('div', {class:'progress-dot'});
    if (i < current) dot.classList.add('done');
    else if (i === current) dot.classList.add('active');
    bar.appendChild(dot);
  }
  return bar;
}

function textInput(field, placeholder, type='text') {
  const inp = el('input', {type, placeholder});
  inp.value = state.form[field] || '';
  if (state.errors[field]) inp.classList.add('error');
  inp.oninput = e => { state.form[field] = e.target.value; delete state.errors[field]; };
  return inp;
}

// ─── VALIDATE ─────────────────────────────────────────────────────────────────
function validate(s) {
  const e = {};
  if (s===1) {
    if (!state.form.name.trim()) e.name = "Required";
    if (!/^\d{10}$/.test(state.form.phone)) e.phone = "10-digit number required";
    if (!state.form.stateVal) e.stateVal = "Required";
    if (!state.form.city) e.city = "Required";
    if (state.form.city === "Other" && !state.form.otherCity.trim()) e.otherCity = "Please enter your city";
    if (!state.form.platforms.length) e.platforms = "Select at least one";
    if (state.form.platforms.includes("Other") && !state.form.otherPlatform.trim()) e.otherPlatform = "Please specify your platform";
  }
  if (s===2) {
    if (!state.form.vehicleType) e.vehicleType = "Required";
    if (!state.form.fuelType) e.fuelType = "Required";
    if (state.form.fuelType==="EV (Electric)" && !state.form.evSpeed) e.evSpeed = "Required";
    if (state.form.fuelType==="EV (Electric)" && !state.form.chargingMethod) e.chargingMethod = "Required";
    if (state.form.fuelType==="EV (Electric)" && !state.form.chargeTime) e.chargeTime = "Required";
  }
  if (s===3) {
    if (!state.form.ownership) e.ownership = "Required";
    if (!state.form.monthlyExp) e.monthlyExp = "Required";
    if (!state.form.hasInsurance) e.hasInsurance = "Required";
  }
  if (s===4) {
    if (!state.form.challenges.length) e.challenges = "Select at least one";
    if (!state.form.greeting) e.greeting = "Required";
  }
  return e;
}

// ─── SUBMIT ───────────────────────────────────────────────────────────────────
async function submitForm() {
  const e = validate(4);
  if (Object.keys(e).length) { state.errors = e; render(); return; }
  const f = state.form;
  const payload = {
    timestamp: new Date().toISOString(),
    refCode: state.refCode,
    referredBy: state.referredBy,
    language: state.lang,
    name: f.name, phone: f.phone,
    state: f.stateVal,
    city: f.city === "Other" ? f.otherCity : f.city,
    platforms: f.platforms.map(p => p==="Other" && f.otherPlatform ? f.otherPlatform : p).join(", "),
    vehicleType: f.vehicleType,
    currentVehicle: f.currentVehicle,
    fuelType: f.fuelType,
    evSpeed: f.evSpeed, chargingMethod: f.chargingMethod, chargeTime: f.chargeTime,
    ownership: f.ownership, emiRent: f.rental,
    monthlyExpenses: f.monthlyExp,
    hasInsurance: f.hasInsurance, insuranceType: f.insuranceType,
    challenges: f.challenges.join(", "),
    rtoTraining: f.trainingReceived,
    customerTraining: f.greeting,
    appChallenges: f.appChallenges.join(", "),
  };
  if (SHEET_URL !== "YOUR_APPS_SCRIPT_URL_HERE") {
    try {
      const params = new URLSearchParams({ action: 'submit', ...payload });
      const res = await fetch(`${SHEET_URL}?${params}`);
      const json = await res.json();

      // Block duplicate phone numbers
      if (json.duplicate) {
        alert('⚠️ This phone number has already been submitted. Only one response per person is allowed.');
        return; // stops here, does NOT go to Thank You screen
      }
    } catch(err) { console.error(err); }
  
  }
  state.step = 5;
  render();
}

    spGrp.appendChild(el('label', {}, tr('evSpeed')));
    spGrp.appendChild(chips(SPEEDS, 'evSpeed'));
    if (state.errors.evSpeed) spGrp.appendChild(errMsg('evSpeed'));
    frag.appendChild(spGrp);

    const chGrp = el('div', {class:'group'});
    chGrp.appendChild(listenBtn(tr('chargingMethod')));
    chGrp.appendChild(el('label', {}, tr('chargingMethod')));
    chGrp.appendChild(chips(CHARGING, 'chargingMethod'));
    if (state.errors.chargingMethod) chGrp.appendChild(errMsg('chargingMethod'));
    frag.appendChild(chGrp);

    const ctGrp = el('div', {class:'group'});
    ctGrp.appendChild(listenBtn(tr('chargeTime')));
    ctGrp.appendChild(el('label', {}, tr('chargeTime')));
    ctGrp.appendChild(chips(CHARGE_TIMES, 'chargeTime'));
    if (state.errors.chargeTime) ctGrp.appendChild(errMsg('chargeTime'));
    frag.appendChild(ctGrp);
  }

  const nav = el('div', {class:'nav-row'});
  const backBtn = el('button', {class:'btn-ghost'}, tr('prev'));
  backBtn.onclick = () => { state.step=1; window.scrollTo(0,0); render(); };
  const nextBtn = el('button', {class:'btn'}, tr('next') + ' →');
  nextBtn.onclick = () => { const e=validate(2); if(Object.keys(e).length){state.errors=e;render();return;} state.step=3; window.scrollTo(0,0); render(); };
  nav.appendChild(backBtn); nav.appendChild(nextBtn);
  frag.appendChild(nav);
  return frag;
}

function renderStep3() {
  const frag = document.createDocumentFragment();
  frag.appendChild(el('div', {class:'title'}, tr('title')));
  frag.appendChild(progress(3));

  // Ownership
  const owGrp = el('div', {class:'group'});
  owGrp.appendChild(listenBtn(tr('ownership')));
  owGrp.appendChild(el('label', {}, tr('ownership')));
  owGrp.appendChild(chips(OWNERSHIP_OPTS, 'ownership'));
  if (state.errors.ownership) owGrp.appendChild(errMsg('ownership'));
  frag.appendChild(owGrp);

  // EMI/Rent — only for Rented/Leased or Loan (EMI)
  if (state.form.ownership === 'Rented/Leased' || state.form.ownership === 'Loan (EMI)') {
    const rGrp = el('div', {class:'group'});
    const lbl = state.form.ownership === 'Loan (EMI)' ? 'Monthly EMI (₹)' : 'Monthly Rent (₹)';
    rGrp.appendChild(el('label', {}, lbl));
    rGrp.appendChild(textInput('rental', state.form.ownership === 'Loan (EMI)' ? '₹ EMI per month' : '₹ rent per month'));
    frag.appendChild(rGrp);
  }

  // Monthly expenses
  const meGrp = el('div', {class:'group'});
  meGrp.appendChild(el('label', {}, tr('monthlyExp')));
  meGrp.appendChild(chips(COST_RANGES, 'monthlyExp'));
  if (state.errors.monthlyExp) meGrp.appendChild(errMsg('monthlyExp'));
  frag.appendChild(meGrp);

  // Insurance
  const insGrp = el('div', {class:'group'});
  insGrp.appendChild(listenBtn(tr('hasInsurance')));
  insGrp.appendChild(el('label', {}, tr('hasInsurance')));
  insGrp.appendChild(chips(YES_NO, 'hasInsurance'));
  if (state.errors.hasInsurance) insGrp.appendChild(errMsg('hasInsurance'));
  frag.appendChild(insGrp);

  if (state.form.hasInsurance === 'Yes') {
    const itGrp = el('div', {class:'group'});
    itGrp.appendChild(el('label', {}, tr('insuranceType')));
    itGrp.appendChild(chips(INS_TYPES, 'insuranceType'));
    frag.appendChild(itGrp);
  }

  const nav = el('div', {class:'nav-row'});
  const backBtn = el('button', {class:'btn-ghost'}, tr('prev'));
  backBtn.onclick = () => { state.step=2; window.scrollTo(0,0); render(); };
  const nextBtn = el('button', {class:'btn'}, tr('next') + ' →');
  nextBtn.onclick = () => { const e=validate(3); if(Object.keys(e).length){state.errors=e;render();return;} state.step=4; window.scrollTo(0,0); render(); };
  nav.appendChild(backBtn); nav.appendChild(nextBtn);
  frag.appendChild(nav);
  return frag;
}

function renderStep4() {
  const frag = document.createDocumentFragment();
  frag.appendChild(el('div', {class:'title'}, tr('title')));
  frag.appendChild(progress(4));

  const chGrp = el('div', {class:'group'});
  chGrp.appendChild(listenBtn(tr('challenges')));
  chGrp.appendChild(el('label', {}, tr('challenges')));
  chGrp.appendChild(chips(CHALLENGES_LIST, 'challenges', true));
  if (state.errors.challenges) chGrp.appendChild(errMsg('challenges'));
  frag.appendChild(chGrp);

  const trGrp = el('div', {class:'group'});
  trGrp.appendChild(listenBtn(tr('trainingQ')));
  trGrp.appendChild(el('label', {}, tr('trainingQ')));
  trGrp.appendChild(chips(YES_NO, 'trainingReceived'));
  frag.appendChild(trGrp);

  const grGrp = el('div', {class:'group'});
  grGrp.appendChild(listenBtn(tr('greeting')));
  grGrp.appendChild(el('label', {}, tr('greeting')));
  grGrp.appendChild(chips(YES_NO, 'greeting'));
  if (state.errors.greeting) grGrp.appendChild(errMsg('greeting'));
  frag.appendChild(grGrp);

  const apGrp = el('div', {class:'group'});
  apGrp.appendChild(listenBtn(tr('appChallenges')));
  apGrp.appendChild(el('label', {}, tr('appChallenges')));
  apGrp.appendChild(chips(APP_CHALLENGES, 'appChallenges', true));
  frag.appendChild(apGrp);

  const nav = el('div', {class:'nav-row'});
  const backBtn = el('button', {class:'btn-ghost'}, tr('prev'));
  backBtn.onclick = () => { state.step=3; window.scrollTo(0,0); render(); };
  const submitBtn = el('button', {class:'btn'}, tr('submit') + ' ✓');
  submitBtn.onclick = submitForm;
  nav.appendChild(backBtn); nav.appendChild(submitBtn);
  frag.appendChild(nav);
  return frag;
}

function renderStep5() {
  const shareText = encodeURIComponent('🚗 I just completed the Road Warrior EV Challenge!\nJoin me: https://amitahuja21.github.io/bharat-riders/?ref=' + state.refCode);
  const frag = document.createDocumentFragment();
  frag.appendChild(el('div', {class:'done-emoji'}, '🎉'));
  frag.appendChild(el('div', {class:'done-title'}, tr('doneTitle')));
  frag.appendChild(el('div', {class:'done-body'}, tr('doneBody')));
  const refBox = el('div', {class:'ref-box'}, 'Your Referral Code');
  refBox.appendChild(el('span', {class:'ref-code'}, state.refCode));
  frag.appendChild(refBox);
  const waLink = el('a', {class:'btn-green', href:`https://wa.me/?text=${shareText}`, target:'_blank'}, tr('shareBtn'));
  frag.appendChild(waLink);
  const newBtn = el('button', {class:'btn-ghost'}, 'New Response');
  newBtn.style.width = '100%';
  newBtn.onclick = () => {
    state.step = 0; state.lang = 'en'; state.errors = {};
    Object.keys(state.form).forEach(k => {
      state.form[k] = Array.isArray(state.form[k]) ? [] : '';
    });
    render();
  };
  frag.appendChild(newBtn);
  return frag;
}

// ─── MAIN RENDER ──────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById('app');
  app.innerHTML = '';
  let content;
  switch(state.step) {
    case 0: content = renderStep0(); break;
    case 1: content = renderStep1(); break;
    case 2: content = renderStep2(); break;
    case 3: content = renderStep3(); break;
    case 4: content = renderStep4(); break;
    case 5: content = renderStep5(); break;
  }
  app.appendChild(content);
}

render();
</script>
